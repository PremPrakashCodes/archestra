# Sandbox tmux configuration.
#
# Security posture: a misbehaving agent inside the sandbox could call
# `tmux kill-server` (or related destructive commands) and tear down
# the user's live terminal panel. The single-UID pod means we cannot
# rely on filesystem isolation here, so we lock down the user-keyable
# bindings as defense-in-depth. The in-pod MCP server layers a command-
# broker filter on top of this.
#
# Residual risk: if the agent's bash issues `tmux kill-server`
# directly, the panel disconnects until the next pod recycle —
# recoverable, not a security breach.

# Use Ctrl-a (a) as the prefix instead of the default Ctrl-b. Easier to
# reach without conflicting with bash readline bindings.
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Mouse support (selection, scroll, pane resize) — improves the read-only
# panel UX for the user.
set -g mouse on

# Generous scrollback so the user can review what the agent has done.
set -g history-limit 10000

# 256-color terminal so matplotlib/rich/etc render correctly.
set -g default-terminal "screen-256color"

# Status bar tuned for a server-side session — minimal, no clutter.
set -g status on
set -g status-interval 5
set -g status-left  "#[bold]sandbox#[default] | "
set -g status-right "%Y-%m-%d %H:%M"

# ---- Locked-down bindings (defense in depth) ----
# Unbind every default keybinding that destroys the server, the active
# session, or detaches the watching client. Combined with the in-pod MCP
# server's send-keys filter, this means the only sanctioned way to end a
# tmux window is via the `pty_kill` MCP tool.
unbind-key -T prefix C-d            # detach-client
unbind-key -T prefix d              # detach-client
unbind-key -T prefix D              # choose-client + detach
unbind-key -T prefix C-z            # suspend-client
unbind-key -T prefix z              # zoom is fine; rebind below
unbind-key -T prefix \&             # kill-window prompt (replaced via pty_kill)
unbind-key -T prefix x              # kill-pane prompt
unbind-key -T prefix q              # display-panes (harmless, but unused)

# Re-enable the only one we want to keep from the unbinds above: zoom.
bind-key z resize-pane -Z

# Window switching stays available to the user via mouse and standard
# vim-style navigation.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
