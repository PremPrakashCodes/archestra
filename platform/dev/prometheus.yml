global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Archestra metrics
  - job_name: "archestra"
    static_configs:
      - targets: ["host.docker.internal:9050"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Scrape PostgreSQL metrics (postgres_exporter sidecar via Bitnami helm subchart)
  - job_name: "postgresql"
    static_configs:
      - targets: ["host.docker.internal:9187"]
    scrape_interval: 30s
