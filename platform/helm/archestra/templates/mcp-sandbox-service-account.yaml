{{- if .Values.archestra.orchestrator.sandbox.enabled }}
---
# Dedicated ServiceAccount for sandbox pods with NO role bindings.
#
# Sandbox pods set `automountServiceAccountToken: false` in their pod spec
# (emitted by the K8s YAML generator), so the token is never projected into
# the pod even if the SA had bindings — but we use a no-RBAC SA as defense
# in depth: even if a future code path forgets to set
# `automountServiceAccountToken: false`, the projected token would carry no
# permissions.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "archestra-platform.fullname" . }}-mcp-sandbox-no-rbac
  namespace: {{ .Values.archestra.orchestrator.kubernetes.namespace | default .Release.Namespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-sandbox-service-account
automountServiceAccountToken: false
{{- end }}
